<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Rocket Pod — green box launcher, top-down view, barrel faces up -->
  <!-- Main housing (green box) -->
  <rect x="12" y="14" width="24" height="26" rx="3" fill="#2e6b2e" stroke="#1a4a1a" stroke-width="1.5"/>
  <!-- Top plate / lid -->
  <rect x="14" y="16" width="20" height="6" rx="1" fill="#3a8a3a" stroke="#1a4a1a" stroke-width="1"/>
  <!-- Three rocket tubes (dark circles, top-down view) -->
  <circle cx="18" cy="28" r="3.5" fill="#1a1a1a" stroke="#111" stroke-width="1"/>
  <circle cx="24" cy="28" r="3.5" fill="#1a1a1a" stroke="#111" stroke-width="1"/>
  <circle cx="30" cy="28" r="3.5" fill="#1a1a1a" stroke="#111" stroke-width="1"/>
  <!-- Rocket noses visible in tubes -->
  <circle cx="18" cy="28" r="1.5" fill="#cc4422"/>
  <circle cx="24" cy="28" r="1.5" fill="#cc4422"/>
  <circle cx="30" cy="28" r="1.5" fill="#cc4422"/>
  <!-- Barrel guide rails (point upward) -->
  <rect x="16" y="6" width="4" height="10" rx="1" fill="#3d7a3d" stroke="#1a4a1a" stroke-width="0.8"/>
  <rect x="22" y="6" width="4" height="10" rx="1" fill="#3d7a3d" stroke="#1a4a1a" stroke-width="0.8"/>
  <rect x="28" y="6" width="4" height="10" rx="1" fill="#3d7a3d" stroke="#1a4a1a" stroke-width="0.8"/>
  <!-- Barrel openings at top -->
  <circle cx="18" cy="8" r="1.4" fill="#0a0a0a"/>
  <circle cx="24" cy="8" r="1.4" fill="#0a0a0a"/>
  <circle cx="30" cy="8" r="1.4" fill="#0a0a0a"/>
  <!-- Mount point -->
  <rect x="19" y="40" width="10" height="4" rx="1.5" fill="#444" stroke="#333" stroke-width="1"/>
</svg>