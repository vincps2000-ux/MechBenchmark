<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Muzzle brake – wider than barrel, vented -->
  <rect x="18" y="3" width="12" height="5" rx="1" fill="#505050" stroke="#222" stroke-width="1"/>
  <rect x="19" y="3" width="2" height="3" fill="#1e1e1e"/>
  <rect x="27" y="3" width="2" height="3" fill="#1e1e1e"/>
  <!-- Main barrel – thick, heavy -->
  <rect x="21" y="8" width="6" height="19" rx="1" fill="#464646" stroke="#252525" stroke-width="1"/>
  <!-- Barrel jacket ring -->
  <rect x="19" y="13" width="10" height="4" rx="1" fill="#373737" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Receiver block -->
  <rect x="16" y="27" width="16" height="13" rx="2" fill="#353535" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Orange accent band -->
  <rect x="16" y="31" width="16" height="3" fill="#cc5500" opacity="0.92"/>
  <!-- Ejection port cutout -->
  <rect x="25" y="28" width="5" height="6" rx="1" fill="#1a1a1a"/>
  <!-- Magazine -->
  <rect x="21" y="40" width="6" height="6" rx="1" fill="#4a4a4a" stroke="#222" stroke-width="1"/>
  <!-- Front sight pip -->
  <circle cx="24" cy="5" r="1" fill="#ffcc00"/>
</svg>
