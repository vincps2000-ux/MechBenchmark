<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- WW2-style triple naval turret, facing +X -->
  <g id="naval_turret">
    <!-- Barbette ring -->
    <ellipse cx="32" cy="32" rx="22" ry="18" fill="#4c5563" stroke="#2b323d" stroke-width="2"/>
    <ellipse cx="32" cy="32" rx="18" ry="14" fill="#5f6877" stroke="#3a4351" stroke-width="1"/>

    <!-- Turret body with sloped front armor -->
    <path d="M14 26 L24 18 L45 18 L54 24 L54 40 L45 46 L24 46 L14 38 Z"
          fill="#6a7383" stroke="#2d3643" stroke-width="1.5"/>

    <!-- Roof plates and rivet lines -->
    <line x1="24" y1="23" x2="44" y2="23" stroke="#4d5666" stroke-width="1"/>
    <line x1="24" y1="41" x2="44" y2="41" stroke="#4d5666" stroke-width="1"/>
    <line x1="30" y1="18" x2="30" y2="46" stroke="#4d5666" stroke-width="0.9"/>
    <line x1="38" y1="18" x2="38" y2="46" stroke="#4d5666" stroke-width="0.9"/>

    <!-- Triple gun mount mantlet -->
    <rect x="44" y="24" width="8" height="16" rx="2" fill="#535d6c" stroke="#2d3643" stroke-width="1"/>

    <!-- Three gun barrels (fore, upper/lower spread in sprite Y axis) -->
    <rect x="50" y="27" width="12" height="3" rx="1" fill="#8b96a8" stroke="#2f3744" stroke-width="0.8"/>
    <rect x="50" y="31" width="13" height="3" rx="1" fill="#9aa5b7" stroke="#2f3744" stroke-width="0.8"/>
    <rect x="50" y="35" width="12" height="3" rx="1" fill="#8b96a8" stroke="#2f3744" stroke-width="0.8"/>

    <!-- Muzzle breaks -->
    <rect x="61" y="27" width="2" height="3" fill="#c8d0de"/>
    <rect x="62" y="31" width="2" height="3" fill="#d7deea"/>
    <rect x="61" y="35" width="2" height="3" fill="#c8d0de"/>

    <!-- Commander cupola -->
    <circle cx="25" cy="27" r="3" fill="#4a5362" stroke="#2b323d" stroke-width="1"/>
    <rect x="23.5" y="24" width="3" height="1" fill="#778195"/>

    <!-- Subtle top-left highlight -->
    <path d="M17 27 L25 20 L43 20 L50 24" fill="none" stroke="#8d98aa" stroke-width="1.2" opacity="0.5"/>
  </g>
</svg>
