<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Spider legs — top-down view, robot faces right (+X) -->
  <!-- Six mechanical legs: 3 upper, 3 lower, with knee joints -->

  <!-- Upper legs (left side in robot-frame = top of screen) -->
  <!-- Front-upper leg: shoulder→knee→tip -->
  <polyline points="38,28 52,16 60,8" fill="none" stroke="#607080" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="52" cy="16" r="2.5" fill="#8090a0"/>
  <!-- Mid-upper leg -->
  <polyline points="32,22 28,10 26,2" fill="none" stroke="#607080" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="28" cy="10" r="2.5" fill="#8090a0"/>
  <!-- Back-upper leg -->
  <polyline points="26,28 12,18 4,10" fill="none" stroke="#607080" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="18" r="2.5" fill="#8090a0"/>

  <!-- Lower legs (right side in robot-frame = bottom of screen) -->
  <!-- Front-lower leg -->
  <polyline points="38,36 52,48 60,56" fill="none" stroke="#607080" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="52" cy="48" r="2.5" fill="#8090a0"/>
  <!-- Mid-lower leg -->
  <polyline points="32,42 28,54 26,62" fill="none" stroke="#607080" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="28" cy="54" r="2.5" fill="#8090a0"/>
  <!-- Back-lower leg -->
  <polyline points="26,36 12,46 4,54" fill="none" stroke="#607080" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="12" cy="46" r="2.5" fill="#8090a0"/>

  <!-- Central spider body -->
  <ellipse cx="32" cy="32" rx="10" ry="8" fill="#2a3540" stroke="#8090a0" stroke-width="1.5"/>
  <!-- Body highlight -->
  <ellipse cx="31" cy="30" rx="5" ry="3.5" fill="#3a4d5a" stroke="none"/>
  <!-- Front direction dot (right side) -->
  <circle cx="40" cy="32" r="2" fill="#c8a040"/>
</svg>
