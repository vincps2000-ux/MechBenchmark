<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Bipedal mech legs — top-down view, robot faces right (+X) -->
  <!-- Two legs in walking pose, upper = robot-left, lower = robot-right -->

  <!-- Upper leg (robot-left) -->
  <!-- Thigh -->
  <rect x="4" y="9" width="32" height="14" rx="5" ry="5" fill="#3a4d5a" stroke="#8090a0" stroke-width="1.5"/>
  <rect x="5" y="10" width="30" height="5" rx="3" ry="3" fill="#5a7080" opacity="0.6"/>
  <!-- Knee joint -->
  <circle cx="36" cy="16" r="5.5" fill="#2a3a46" stroke="#8090a0" stroke-width="1.5"/>
  <circle cx="36" cy="16" r="2.5" fill="#c8a040"/>
  <!-- Shin -->
  <rect x="38" y="11" width="20" height="10" rx="4" ry="4" fill="#3a4d5a" stroke="#8090a0" stroke-width="1.5"/>
  <!-- Foot -->
  <rect x="56" y="12" width="7" height="8" rx="2" ry="2" fill="#2a3a46" stroke="#9aabbb" stroke-width="1"/>

  <!-- Lower leg (robot-right) — slightly staggered back to suggest stride -->
  <!-- Thigh -->
  <rect x="8" y="41" width="32" height="14" rx="5" ry="5" fill="#3a4d5a" stroke="#8090a0" stroke-width="1.5"/>
  <rect x="9" y="42" width="30" height="5" rx="3" ry="3" fill="#5a7080" opacity="0.6"/>
  <!-- Knee joint -->
  <circle cx="40" cy="48" r="5.5" fill="#2a3a46" stroke="#8090a0" stroke-width="1.5"/>
  <circle cx="40" cy="48" r="2.5" fill="#c8a040"/>
  <!-- Shin -->
  <rect x="42" y="43" width="18" height="10" rx="4" ry="4" fill="#3a4d5a" stroke="#8090a0" stroke-width="1.5"/>
  <!-- Foot -->
  <rect x="58" y="44" width="6" height="8" rx="2" ry="2" fill="#2a3a46" stroke="#9aabbb" stroke-width="1"/>

  <!-- Hip connectors (where the body attaches to legs) -->
  <rect x="2" y="24" width="10" height="16" rx="3" ry="3" fill="#2a3a46" stroke="#607080" stroke-width="1"/>
  <!-- Hip detail -->
  <circle cx="7" cy="32" r="3" fill="#3a4d5a" stroke="#8090a0" stroke-width="1"/>
</svg>
