<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Pom-Pom Gun — cartoony quad-barrel flak gun, top-down, barrels face up -->
  <!-- Ammo drum (fat, round, riveted) -->
  <circle cx="24" cy="34" r="10" fill="#5a6b3a" stroke="#2c3618" stroke-width="2.5"/>
  <circle cx="24" cy="34" r="6" fill="#6d804a" stroke="#2c3618" stroke-width="1.5"/>
  <circle cx="24" cy="34" r="2" fill="#3a4622"/>
  <!-- Drum rivets -->
  <circle cx="17.5" cy="30" r="1.1" fill="#8a9c5e"/>
  <circle cx="30.5" cy="30" r="1.1" fill="#8a9c5e"/>
  <circle cx="17.5" cy="38" r="1.1" fill="#8a9c5e"/>
  <circle cx="30.5" cy="38" r="1.1" fill="#8a9c5e"/>
  <!-- Receiver block -->
  <rect x="12" y="18" width="24" height="10" rx="3" fill="#6d804a" stroke="#2c3618" stroke-width="2.5"/>
  <!-- Four stubby barrels with fat muzzle rings -->
  <rect x="13" y="7" width="4.5" height="13" rx="2" fill="#556644" stroke="#2c3618" stroke-width="2"/>
  <rect x="19" y="5" width="4.5" height="15" rx="2" fill="#556644" stroke="#2c3618" stroke-width="2"/>
  <rect x="24.5" y="5" width="4.5" height="15" rx="2" fill="#556644" stroke="#2c3618" stroke-width="2"/>
  <rect x="30.5" y="7" width="4.5" height="13" rx="2" fill="#556644" stroke="#2c3618" stroke-width="2"/>
  <!-- Muzzle rings (exaggerated, cartoony) -->
  <rect x="12" y="6" width="6.5" height="3.5" rx="1.7" fill="#7d9055" stroke="#2c3618" stroke-width="1.5"/>
  <rect x="18" y="4" width="6.5" height="3.5" rx="1.7" fill="#7d9055" stroke="#2c3618" stroke-width="1.5"/>
  <rect x="23.5" y="4" width="6.5" height="3.5" rx="1.7" fill="#7d9055" stroke="#2c3618" stroke-width="1.5"/>
  <rect x="29.5" y="6" width="6.5" height="3.5" rx="1.7" fill="#7d9055" stroke="#2c3618" stroke-width="1.5"/>
  <!-- Star stencil on the receiver -->
  <path d="M24 20 L25 22.2 L27.4 22.2 L25.5 23.6 L26.2 25.8 L24 24.5 L21.8 25.8 L22.5 23.6 L20.6 22.2 L23 22.2 Z" fill="#d8c96a"/>
</svg>
