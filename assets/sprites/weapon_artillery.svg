<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Long howitzer barrel, elevated -->
  <rect x="21" y="2" width="6" height="26" rx="2" fill="#3f3f3f" stroke="#202020" stroke-width="1"/>
  <!-- Muzzle brake -->
  <rect x="19" y="2" width="10" height="4" rx="1" fill="#525252" stroke="#1e1e1e" stroke-width="1"/>
  <rect x="20" y="2" width="2" height="2.5" fill="#171717"/>
  <rect x="26" y="2" width="2" height="2.5" fill="#171717"/>
  <!-- Recoil sleeve ring -->
  <rect x="18" y="14" width="12" height="5" rx="1" fill="#343434" stroke="#1c1c1c" stroke-width="1"/>
  <!-- Breech / receiver block -->
  <rect x="15" y="27" width="18" height="13" rx="2" fill="#333333" stroke="#1b1b1b" stroke-width="1.5"/>
  <!-- Red ordnance accent band -->
  <rect x="15" y="31" width="18" height="3" fill="#cc2418" opacity="0.95"/>
  <!-- Recoil spade trails -->
  <rect x="11" y="38" width="6" height="8" rx="1" fill="#444444" stroke="#222" stroke-width="1"/>
  <rect x="31" y="38" width="6" height="8" rx="1" fill="#444444" stroke="#222" stroke-width="1"/>
  <!-- Targeting pip -->
  <circle cx="24" cy="4" r="1.1" fill="#ff3b2f"/>
</svg>
