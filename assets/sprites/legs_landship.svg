<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 64" width="96" height="64">
  <!-- Landship treads — elongated chassis, faces right (+X) -->

  <!-- Upper tread body -->
  <rect x="2" y="7" width="92" height="20" rx="8" ry="8" fill="#34414b" stroke="#8394a2" stroke-width="1.5"/>
  <rect x="2" y="8" width="92" height="4" rx="3" ry="3" fill="#617382" opacity="0.5"/>

  <!-- Upper tread links -->
  <line x1="10" y1="7" x2="10" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="18" y1="7" x2="18" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="26" y1="7" x2="26" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="34" y1="7" x2="34" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="42" y1="7" x2="42" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="50" y1="7" x2="50" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="58" y1="7" x2="58" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="66" y1="7" x2="66" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="74" y1="7" x2="74" y2="27" stroke="#242d35" stroke-width="2"/>
  <line x1="82" y1="7" x2="82" y2="27" stroke="#242d35" stroke-width="2"/>

  <!-- Lower tread body -->
  <rect x="2" y="37" width="92" height="20" rx="8" ry="8" fill="#34414b" stroke="#8394a2" stroke-width="1.5"/>
  <rect x="2" y="38" width="92" height="4" rx="3" ry="3" fill="#617382" opacity="0.5"/>

  <!-- Lower tread links -->
  <line x1="10" y1="37" x2="10" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="18" y1="37" x2="18" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="26" y1="37" x2="26" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="34" y1="37" x2="34" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="42" y1="37" x2="42" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="50" y1="37" x2="50" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="58" y1="37" x2="58" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="66" y1="37" x2="66" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="74" y1="37" x2="74" y2="57" stroke="#242d35" stroke-width="2"/>
  <line x1="82" y1="37" x2="82" y2="57" stroke="#242d35" stroke-width="2"/>

  <!-- Central hull connector -->
  <rect x="16" y="26" width="64" height="12" rx="2" ry="2" fill="#26323c" stroke="#5f7080" stroke-width="1"/>
  <polygon points="80,30 92,32 80,34" fill="#c8a040"/>

  <!-- Hull bolts -->
  <circle cx="26" cy="32" r="2" fill="#607080"/>
  <circle cx="38" cy="32" r="2" fill="#607080"/>
  <circle cx="50" cy="32" r="2" fill="#607080"/>
  <circle cx="62" cy="32" r="2" fill="#607080"/>
  <circle cx="74" cy="32" r="2" fill="#607080"/>
</svg>
